<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Banjarnegara - Sistem Terminal</title>
</head>
<body>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  const user = Auth.check();
  buildSidebar('input-banjarnegara');
</script>

<div class="wrapper">
  <div class="main-content">
    <div class="page-header">
      <h1>✏️ Input Data — Terminal Banjarnegara</h1>
      <p id="tglHariIni"></p>
    </div>

    <!-- Pilih Layanan -->
    <div class="card">
      <div class="card-title">Pilih Layanan</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="btnAKAP" onclick="setLayanan('AKAP')">AKAP</button>
        <button class="btn btn-secondary" id="btnAKDP" onclick="setLayanan('AKDP')">AKDP</button>

      </div>
    </div>

    <!-- Form Input Bus -->
    <div class="card">
      <div class="card-title" id="labelFormBus">📝 Form Input Bus — AKAP</div>
      <div class="form-grid">

        <!-- 1. Tanggal -->
        <div class="form-group">
          <label>Tanggal</label>
          <input type="date" id="tanggal" />
        </div>

        <!-- 2. Bermalam -->
        <div class="form-group">
          <label>Status Kedatangan</label>
          <select id="statusBermalam" onchange="onBermalamChange()">
            <option value="tidak">Tidak Bermalam</option>
            <option value="bermalam">Bermalam (Tiba kemarin)</option>
          </select>
        </div>

        <!-- 3. Nomor Bus (dengan autofill) -->
        <div class="form-group" style="position:relative;">
          <label>Nomor Bus</label>
          <input type="text" id="nomor_bus" placeholder="Ketik nomor bus..." oninput="onNomorBusInput(this.value)" autocomplete="off" />
          <div id="sugestiBus" style="position:absolute;background:white;border:1px solid #ddd;border-radius:6px;z-index:100;width:100%;max-height:160px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.15);display:none;top:100%;left:0;"></div>
        </div>

        <!-- 4. Nama PO -->
        <div class="form-group">
          <label>Nama PO</label>
          <select id="nama_po" onchange="onPOChange()">
            <option value="">-- Pilih PO --</option>
          </select>
          <div id="wrapPOManual" style="display:none;margin-top:6px;">
            <input type="text" id="nama_po_manual" placeholder="Ketik nama PO baru..." oninput="this.value=this.value.toUpperCase()" style="width:100%;box-sizing:border-box;" />
          </div>
          <div style="margin-top:4px;">
            <label style="font-size:12px;color:#555;cursor:pointer;">
              <input type="checkbox" id="chkPOManual" onchange="togglePOManual()" style="margin-right:4px;" />
              Checklist jika tidak ada di data
            </label>
          </div>
        </div>

        <!-- 5. PT/Koperasi -->
        <div class="form-group">
          <label>PT/Koperasi</label>
          <input type="text" id="koperasi" oninput="this.value=this.value.toUpperCase()" />
        </div>

        <!-- 6. Trayek -->
        <div class="form-group">
          <label>Trayek/Jurusan</label>
          <select id="trayek">
            <option value="">-- Pilih Trayek --</option>
          </select>
          <div id="wrapTrayekManual" style="display:none;margin-top:6px;">
            <input type="text" id="trayek_manual" placeholder="Ketik trayek baru..." oninput="this.value=this.value.toUpperCase()" style="width:100%;box-sizing:border-box;" />
          </div>
          <div style="margin-top:4px;">
            <label style="font-size:12px;color:#555;cursor:pointer;">
              <input type="checkbox" id="chkTrayekManual" onchange="toggleTrayekManual()" style="margin-right:4px;" />Checklist jika tidak ada di data
            </label>
          </div>
        </div>

        <!-- 7. Jam Datang -->
        <div class="form-group" id="grpJamDatang">
          <label>Jam Datang</label>
          <input type="time" id="jam_datang" />
        </div>

        <!-- 8. Jam Berangkat -->
        <div class="form-group" id="grpJamBerangkat">
          <label>Jam Berangkat</label>
          <input type="time" id="jam_berangkat" />
        </div>

        <!-- 9. Jml Seat -->
        <div class="form-group">
          <label>Jml Seat</label>
          <input type="number" id="jml_seat" min="0" value="0" />
        </div>

        <!-- 10. Jml Penumpang -->
        <div class="form-group">
          <label>Jml Penumpang</label>
          <input type="number" id="jml_pnp" min="0" value="0" />
        </div>

        <!-- 11. Pnp Naik -->
        <div class="form-group">
          <label>Pnp Naik</label>
          <input type="number" id="pnp_naik" min="0" value="0" />
        </div>

        <!-- 12. Pnp Turun -->
        <div class="form-group">
          <label>Pnp Turun</label>
          <input type="number" id="pnp_turun" min="0" value="0" />
        </div>

      </div>

      <!-- Jenis Bus -->
      <div style="margin-top:12px;">
        <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:6px;">Jenis Bus</label>
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
          <label style="font-size:13px;"><input type="radio" name="jenisBus" value="BK" checked /> BK (Bus Kecil)</label>
          <label style="font-size:13px;"><input type="radio" name="jenisBus" value="BS" /> BS (Bus Sedang)</label>
          <label style="font-size:13px;"><input type="radio" name="jenisBus" value="BB" /> BB (Bus Besar)</label>
          <label id="labelMPU" style="font-size:13px;display:none;"><input type="radio" name="jenisBus" value="MPU" /> MPU</label>
        </div>
      </div>

      <!-- Laik Jalan -->
      <div style="margin-top:12px;">
        <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:6px;">Laik Jalan</label>
        <div style="display:flex;gap:16px;">
          <label style="font-size:13px;"><input type="radio" name="laikJalan" value="laik" checked /> Laik Jalan</label>
          <label style="font-size:13px;"><input type="radio" name="laikJalan" value="tidak" /> Tidak Laik</label>
        </div>
      </div>

      <!-- Keterangan -->
      <div class="form-group" style="margin-top:12px;">
        <label>Keterangan</label>
        <input type="text" id="keterangan" placeholder="Opsional" />
      </div>

      <div style="margin-top:14px;display:flex;gap:10px;">
        <button class="btn btn-success" id="btnSimpan" onclick="simpanData()">💾 Simpan Data</button>
        <button class="btn btn-secondary" onclick="resetForm()">🔄 Reset</button>
      </div>
    </div>

    <!-- Input Pengunjung -->
    <div class="card">
      <div class="card-title">🧍 Input Pengunjung</div>
      <div class="form-grid">
        <div class="form-group"><label>Tanggal</label><input type="date" id="tglPgj" /></div>
        <div class="form-group"><label>Jumlah Pengunjung</label><input type="number" id="jmlPgj" min="0" value="0" /></div>
        <div class="form-group"><label>Keterangan</label><input type="text" id="ketPgj" placeholder="Opsional" /></div>
      </div>
      <div style="margin-top:12px;">
        <button class="btn btn-success" id="btnSimpanPgj" onclick="simpanPengunjung()">💾 Simpan Pengunjung</button>
      </div>
    </div>

    <!-- Tabel Harian -->
    <div class="card">
      <div class="card-title">📋 Rekap Data Hari Ini</div>
      <div class="filter-bar">
        <div class="form-group"><label>Tanggal</label><input type="date" id="filterTgl" /></div>
        <div class="form-group">
          <label>Layanan</label>
          <select id="filterLayanan">
            <option value="Semua">Semua</option>
            <option value="AKAP">AKAP</option>
            <option value="AKDP">AKDP</option>

          </select>
        </div>
        <div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="loadTabel()">🔍 Cari</button></div>
      </div>
      <div class="table-wrapper">
        <div class="loading" id="loadingTabel"><span class="spinner"></span> Memuat...</div>
        <table id="tabelHarian" style="display:none;">
          <thead>
            <tr>
              <th>No</th><th>Layanan</th><th>Jam Datang</th><th>Nama PO</th>
              <th>Koperasi</th><th>Trayek</th><th>No Bus</th>
              <th>Seat</th><th>Pnp</th><th>Laik</th><th>Ket</th><th>Aksi</th>
            </tr>
          </thead>
          <tbody id="bodyTabel"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Modal Edit Data -->
<div id="modalEdit" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;overflow-y:auto;">
  <div style="background:#fff;max-width:600px;margin:40px auto;border-radius:12px;padding:24px;position:relative;">
    <h3 style="margin:0 0 16px;color:#1a237e;">✏️ Edit Data Bus</h3>
    <input type="hidden" id="editId" />
    <input type="hidden" id="editTanggal" />
    <input type="hidden" id="editLayanan" />
    <div class="form-grid">
      <div class="form-group">
        <label>Jam Datang</label>
        <input type="time" id="editJamDatang" />
      </div>
      <div class="form-group">
        <label>Jam Berangkat</label>
        <input type="time" id="editJamBerangkat" />
      </div>
      <div class="form-group">
        <label>Nomor Bus</label>
        <input type="text" id="editNomorBus" />
      </div>
      <div class="form-group">
        <label>Nama PO</label>
        <input type="text" id="editNamaPO" />
      </div>
      <div class="form-group">
        <label>Koperasi</label>
        <input type="text" id="editKoperasi" />
      </div>
      <div class="form-group">
        <label>Trayek</label>
        <input type="text" id="editTrayek" />
      </div>
      <div class="form-group">
        <label>Jml Seat</label>
        <input type="number" id="editSeat" min="0" />
      </div>
      <div class="form-group">
        <label>Jml Penumpang</label>
        <input type="number" id="editPnp" min="0" />
      </div>
      <div class="form-group">
        <label>Pnp Naik</label>
        <input type="number" id="editPnpNaik" min="0" />
      </div>
      <div class="form-group">
        <label>Pnp Turun</label>
        <input type="number" id="editPnpTurun" min="0" />
      </div>
    </div>
    <div style="margin-top:12px;">
      <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:6px;">Jenis Bus</label>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <label style="font-size:13px;"><input type="radio" name="editJenisBus" value="BK" /> BK (Bus Besar)</label>
        <label style="font-size:13px;"><input type="radio" name="editJenisBus" value="BS" /> BS (Bus Sedang)</label>
        <label style="font-size:13px;"><input type="radio" name="editJenisBus" value="BB" /> BB (Bus Kecil)</label>
        <label style="font-size:13px;"><input type="radio" name="editJenisBus" value="MPU" /> MPU</label>
      </div>
    </div>
    <div style="margin-top:12px;">
      <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:6px;">Laik Jalan</label>
      <div style="display:flex;gap:16px;">
        <label style="font-size:13px;"><input type="radio" name="editLaik" value="laik" /> Laik Jalan</label>
        <label style="font-size:13px;"><input type="radio" name="editLaik" value="tidak" /> Tidak Laik</label>
      </div>
    </div>
    <div class="form-group" style="margin-top:12px;">
      <label>Keterangan</label>
      <input type="text" id="editKeterangan" placeholder="Opsional" />
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-success" onclick="simpanEdit()">💾 Simpan Perubahan</button>
      <button class="btn btn-secondary" onclick="tutupModal()">✖ Batal</button>
    </div>
  </div>
</div>

<script>
  const TERMINAL = 'BANJARNEGARA';
  let layananAktif = 'AKAP';
  let masterPO = [];
  let masterTrayek = [];
  let masterBus = [];

  // Init
  document.getElementById('tglHariIni').textContent = new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('tanggal').value = todayISO();
  document.getElementById('filterTgl').value = todayISO();
  document.getElementById('tglPgj').value = todayISO();

  // Tutup sugesti klik di luar
  document.addEventListener('click', e => {
    if (!e.target.closest('#nomor_bus') && !e.target.closest('#sugestiBus'))
      document.getElementById('sugestiBus').style.display = 'none';
  });

  // ── Load master PO ──────────────────────────────────────────────────────
  async function loadPO(layanan) {
    try {
      const data = await sbFetch(`master_po?terminal=eq.${TERMINAL}&layanan=eq.${encodeURIComponent(layanan)}&aktif=eq.true&order=nama_po.asc`);
      masterPO = data;
      masterTrayek = []; // reset trayek saat layanan berubah

      const sel = document.getElementById('nama_po');
      sel.innerHTML = '<option value="">-- Pilih PO --</option>';
      data.forEach(p => {
        sel.innerHTML += `<option value="${p.po_id}" data-koperasi="${p.nama_koperasi||''}">${p.nama_po}</option>`;
      });

      // Reset trayek dropdown
      const selT = document.getElementById('trayek');
      selT.innerHTML = '<option value="">-- Pilih Trayek --</option>';
    } catch(e) { showToast('error','Gagal load PO: '+e.message); }
  }

  // ── Load semua trayek untuk PO aktif ────────────────────────────────────
  async function loadAllTrayek() {
    if (!masterPO.length) return;
    try {
      const poIds = masterPO.map(p => p.po_id).join(',');
      masterTrayek = await sbFetch(`master_trayek?po_id=in.(${poIds})&order=rute.asc`);
    } catch(e) { console.warn('Gagal load trayek:', e.message); }
  }

  // ── Load histori nomor bus ───────────────────────────────────────────────
  async function loadHistoriBus() {
    try {
      const data = await sbFetch(`data_harian?terminal=eq.${TERMINAL}&select=nomor_bus,nama_po,koperasi,jml_seat,trayek,BK,BS,BB,MPU&order=created_at.desc&limit=500`);
      const seen = new Set();
      masterBus = data.filter(r => {
  if (!r.nomor_bus || seen.has(r.nomor_bus)) return false;
  seen.add(r.nomor_bus); return true;
}).map(r => ({
  ...r,
  jenis: r.BK ? 'BK' : r.BS ? 'BS' : r.BB ? 'BB' : r.MPU ? 'MPU' : 'BK'
}));
    } catch(e) { masterBus = []; }
  }

  // ── Bermalam → masuk keterangan ─────────────────────────────────────────
  function onBermalamChange() {
    const bermalam = document.getElementById('statusBermalam').value === 'bermalam';
    const grpD = document.getElementById('grpJamDatang');
    const grpB = document.getElementById('grpJamBerangkat');
    grpD.style.opacity = bermalam ? '0.4' : '1';
    grpB.style.opacity = bermalam ? '0.4' : '1';
    document.getElementById('jam_datang').disabled = bermalam;
    document.getElementById('jam_berangkat').disabled = bermalam;
    if (bermalam) {
      document.getElementById('jam_datang').value = '';
      document.getElementById('jam_berangkat').value = '';
      // Isi keterangan otomatis
      if (!document.getElementById('keterangan').value)
        document.getElementById('keterangan').value = 'Bermalam';
    } else {
      if (document.getElementById('keterangan').value === 'Bermalam')
        document.getElementById('keterangan').value = '';
    }
  }

  // ── Autofill nomor bus ───────────────────────────────────────────────────
  function onNomorBusInput(val) {
    const sugesti = document.getElementById('sugestiBus');
    if (!val || val.length < 2) { sugesti.style.display='none'; return; }
    const hasil = masterBus.filter(r => r.nomor_bus.toUpperCase().includes(val.toUpperCase())).slice(0,8);
    if (!hasil.length) { sugesti.style.display='none'; return; }
    sugesti.innerHTML = hasil.map(r => {
  const jenisLabel = r.jenis || 'BK';
  return `<div onclick="pilihBus('${r.nomor_bus}','${(r.nama_po||'').replace(/'/g,"\\'")}','${(r.koperasi||'').replace(/'/g,"\\'")}',${r.jml_seat||0},'${(r.trayek||'').replace(/'/g,"\\'")}','${jenisLabel}')"
    style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0;"
    onmouseover="this.style.background='#f0f4ff'" onmouseout="this.style.background='white'">
    <strong>${r.nomor_bus}</strong>
    <span style="color:#777;font-size:11px;">— ${r.nama_po||''} ${r.trayek?'('+r.trayek+')':''} <span style="background:#e0e0e0;padding:1px 6px;border-radius:4px;font-size:10px;">${jenisLabel}</span></span>
  </div>`;
}).join('');
    sugesti.style.display = 'block';
  }

 async function pilihBus(nomor, namaPo, koperasi, seat, trayek, jenis) {
  document.getElementById('nomor_bus').value = nomor;
  document.getElementById('sugestiBus').style.display = 'none';
  if (koperasi) document.getElementById('koperasi').value = koperasi;
  if (seat && document.getElementById('jml_seat').value == 0)
    document.getElementById('jml_seat').value = seat;

  // 🔥 AUTO-PILIH JENIS BUS
  if (jenis) {
    const radios = document.getElementsByName('jenisBus');
    for (let r of radios) {
      if (r.value === jenis) {
        r.checked = true;
        break;
      }
    }
  }

  // Auto-pilih PO
  if (namaPo) {
    const sel = document.getElementById('nama_po');
    for (let i=0; i<sel.options.length; i++) {
      if (sel.options[i].text.trim() === namaPo.trim()) {
        sel.selectedIndex = i;
        await onPOChange(); // tunggu trayek ke-load
        break;
      }
    }
  }

  // Auto-pilih trayek setelah PO ke-load
  if (trayek) {
    const selT = document.getElementById('trayek');
    for (let i=0; i<selT.options.length; i++) {
      if (selT.options[i].value === trayek) { selT.selectedIndex = i; break; }
    }
  }
}

  // ── Toggle input manual PO ───────────────────────────────────────────────
  function togglePOManual() {
    const manual = document.getElementById('chkPOManual').checked;
    document.getElementById('wrapPOManual').style.display = manual ? 'block' : 'none';
    document.getElementById('nama_po').style.display = manual ? 'none' : '';
    if (!manual) {
      document.getElementById('nama_po_manual').value = '';
      document.getElementById('nama_po').value = '';
      document.getElementById('koperasi').value = '';
      document.getElementById('trayek').innerHTML = '<option value="">-- Pilih Trayek --</option>';
      document.getElementById('chkTrayekManual').checked = false;
      toggleTrayekManual();
    }
  }

  // ── Toggle input manual Trayek ───────────────────────────────────────────
  function toggleTrayekManual() {
    const manual = document.getElementById('chkTrayekManual').checked;
    document.getElementById('wrapTrayekManual').style.display = manual ? 'block' : 'none';
    document.getElementById('trayek').style.display = manual ? 'none' : '';
    if (!manual) document.getElementById('trayek_manual').value = '';
  }

  // ── Helper ambil nilai PO & Trayek (dropdown atau manual) ────────────────
  function getNamaPO() {
    return document.getElementById('chkPOManual').checked
      ? document.getElementById('nama_po_manual').value.trim()
      : document.getElementById('nama_po').options[document.getElementById('nama_po').selectedIndex]?.text || '';
  }
  function getPoId() {
    return document.getElementById('chkPOManual').checked
      ? '' // PO manual tidak punya po_id
      : document.getElementById('nama_po').value;
  }
  function getTrayek() {
    return document.getElementById('chkTrayekManual').checked
      ? document.getElementById('trayek_manual').value.trim()
      : document.getElementById('trayek').value;
  }


  function setLayanan(l) {
    layananAktif = l;
    document.getElementById('btnAKAP').className = l==='AKAP'?'btn btn-primary':'btn btn-secondary';
    document.getElementById('btnAKDP').className = l==='AKDP'?'btn btn-primary':'btn btn-secondary';

    document.getElementById('labelMPU').style.display = l==='AKDP'?'':'none';
    document.getElementById('labelFormBus').textContent = `📝 Form Input Bus — ${l}`;
    if (l!=='AKDP') for(let r of document.getElementsByName('jenisBus')) if(r.value==='MPU') r.checked=false;
    loadPO(l);
  }

  // ── PO berubah → filter trayek ───────────────────────────────────────────
  async function onPOChange() {
    const sel = document.getElementById('nama_po');
    const opt = sel.options[sel.selectedIndex];
    if (opt) document.getElementById('koperasi').value = opt.dataset.koperasi||'';

    const poId = sel.value;
    const selT = document.getElementById('trayek');
    selT.innerHTML = '<option value="">-- Pilih Trayek --</option>';
    if (!poId) return;

    // Load trayek kalau belum ada
    if (!masterTrayek.length) await loadAllTrayek();

    const trayekPO = masterTrayek.filter(t => t.po_id === poId);
    trayekPO.forEach(t => {
      if (t.rute) selT.innerHTML += `<option value="${t.rute}">${t.rute}</option>`;
    });
  }

  // ── Simpan data ──────────────────────────────────────────────────────────
  async function simpanData() {
    const btn = document.getElementById('btnSimpan');
    const tanggal = document.getElementById('tanggal').value;
    const poId    = getPoId();
    const namaPO  = getNamaPO();
    const isManual = document.getElementById('chkPOManual').checked;
    if (!tanggal || (!poId && !isManual) || !namaPO) { showToast('error','Tanggal dan PO wajib diisi!'); return; }

    const bermalam = document.getElementById('statusBermalam').value === 'bermalam';
    const jam_datang    = bermalam ? null : (document.getElementById('jam_datang').value||null);
    const jam_berangkat = bermalam ? null : (document.getElementById('jam_berangkat').value||null);
    const jenisBus = document.querySelector('input[name="jenisBus"]:checked')?.value||'BK';
    const laikVal  = document.querySelector('input[name="laikJalan"]:checked')?.value||'laik';
    const po = masterPO.find(p=>p.po_id===poId);

    let keterangan = document.getElementById('keterangan').value;
    if (bermalam && !keterangan.includes('Bermalam')) keterangan = 'Bermalam' + (keterangan?'; '+keterangan:'');

    const trayekVal = getTrayek();

    const payload = {
      tanggal, jam_datang, jam_berangkat,
      terminal:TERMINAL, layanan:layananAktif,
      po_id: poId||null,
      nama_po: namaPO.toUpperCase(),
      koperasi: document.getElementById('koperasi').value.toUpperCase(),
      trayek: trayekVal.toUpperCase(),
      nomor_bus: document.getElementById('nomor_bus').value.toUpperCase(),
      BK:jenisBus==='BK'?1:0, BS:jenisBus==='BS'?1:0, BB:jenisBus==='BB'?1:0, MPU:jenisBus==='MPU'?1:0,
      jml_seat:parseInt(document.getElementById('jml_seat').value)||0,
      jml_pnp:parseInt(document.getElementById('jml_pnp').value)||0,
      pnp_naik:parseInt(document.getElementById('pnp_naik').value)||0,
      pnp_turun:parseInt(document.getElementById('pnp_turun').value)||0,
      laik:laikVal==='laik'?1:0, tidak_laik:laikVal==='tidak'?1:0,
      keterangan, created_by:user.username
    };

    btn.disabled=true; btn.textContent='⏳ Menyimpan...';
    try {
      await sbFetch('data_harian', {method:'POST', body:JSON.stringify(payload)});
      await updateRekap(tanggal, TERMINAL, layananAktif);
      showToast('success','Data berhasil disimpan!');
      resetForm();
    } catch(e) {
      showToast('error','Gagal simpan: '+e.message);
    } finally {
      btn.disabled=false; btn.textContent='💾 Simpan Data';
    }
  }

  // ── Update rekap bulanan ─────────────────────────────────────────────────
  async function updateRekap(tanggal, terminal, layanan) {
    const rows = await sbFetch(`data_harian?tanggal=eq.${tanggal}&terminal=eq.${terminal}&layanan=eq.${encodeURIComponent(layanan)}&select=*`);
    if (!rows.length) return;
    const poUnik = new Set(rows.map(r=>r.nama_po));
    const tot = rows.reduce((a,r)=>({
      bus_msk:a.bus_msk+1, BK:a.BK+(r.BK||0), BS:a.BS+(r.BS||0), BB:a.BB+(r.BB||0), MPU:a.MPU+(r.MPU||0),
      seat:a.seat+(r.jml_seat||0), penumpang:a.penumpang+(r.jml_pnp||0),
      pnp_naik:a.pnp_naik+(r.pnp_naik||0), pnp_turun:a.pnp_turun+(r.pnp_turun||0),
      laik_jalan:a.laik_jalan+(r.laik||0), tidak_laik:a.tidak_laik+(r.tidak_laik||0)
    }),{bus_msk:0,BK:0,BS:0,BB:0,MPU:0,seat:0,penumpang:0,pnp_naik:0,pnp_turun:0,laik_jalan:0,tidak_laik:0});
    
    // 🔥 PERBAIKAN DI SINI: Hitung bus keluar (yang TIDAK bermalam)
    const busKeluar = rows.filter(r => !(r.keterangan || '').toLowerCase().includes('bermalam')).length;
    
    const d = new Date(tanggal);
    const rekap = {
      bulan:d.getMonth()+1,
      tahun:d.getFullYear(),
      tanggal,
      terminal,
      layanan,
      jml_po:poUnik.size,
      bus_klr:busKeluar,  // ✅ PAKAI busKeluar, BUKAN tot.bus_msk
      ...tot,
      updated_at:new Date().toISOString()
    };
    
    const existing = await sbFetch(`rekap_bulanan?tanggal=eq.${tanggal}&terminal=eq.${terminal}&layanan=eq.${encodeURIComponent(layanan)}`);
    if (existing.length)
      await sbFetch(`rekap_bulanan?tanggal=eq.${tanggal}&terminal=eq.${terminal}&layanan=eq.${encodeURIComponent(layanan)}`,{method:'PATCH',body:JSON.stringify(rekap),prefer:'return=minimal'});
    else
      await sbFetch('rekap_bulanan',{method:'POST',body:JSON.stringify(rekap)});
  }

  // ── Simpan pengunjung ────────────────────────────────────────────────────
  async function simpanPengunjung() {
    const btn = document.getElementById('btnSimpanPgj');
    const tanggal = document.getElementById('tglPgj').value;
    if (!tanggal) { showToast('error','Tanggal wajib diisi!'); return; }
    btn.disabled=true; btn.textContent='⏳ Menyimpan...';
    try {
      const jumlah_pengunjung = parseInt(document.getElementById('jmlPgj').value)||0;
      const keterangan = document.getElementById('ketPgj').value;
      // Cek apakah sudah ada data pengunjung hari itu di terminal ini
      const existing = await sbFetch(`data_pengunjung?tanggal=eq.${tanggal}&terminal=eq.${TERMINAL}`);
      if (existing && existing.length > 0) {
        // Update (PATCH)
        await sbFetch(`data_pengunjung?tanggal=eq.${tanggal}&terminal=eq.${TERMINAL}`,{
          method:'PATCH',
          body:JSON.stringify({ jumlah_pengunjung, keterangan }),
          prefer:'return=minimal'
        });
      } else {
        // Insert baru
        await sbFetch('data_pengunjung',{method:'POST',body:JSON.stringify({
          tanggal, terminal:TERMINAL,
          jumlah_pengunjung, keterangan,
          created_by:user.username
        })});
      }
      showToast('success','Data pengunjung tersimpan!');
      document.getElementById('jmlPgj').value=0;
      document.getElementById('ketPgj').value='';
    } catch(e) { showToast('error','Gagal: '+e.message); }
    finally { btn.disabled=false; btn.textContent='💾 Simpan Pengunjung'; }
  }

  // ── Load tabel harian ────────────────────────────────────────────────────
  async function loadTabel() {
    const tgl = document.getElementById('filterTgl').value;
    const layanan = document.getElementById('filterLayanan').value;
    document.getElementById('loadingTabel').style.display='block';
    document.getElementById('tabelHarian').style.display='none';
    let q = `data_harian?tanggal=eq.${tgl}&terminal=eq.${TERMINAL}&order=tanggal.asc,created_at.asc`;
    if (layanan!=='Semua') q+=`&layanan=eq.${encodeURIComponent(layanan)}`;
    try {
      const data = await sbFetch(q);
      const tbody = document.getElementById('bodyTabel');
      tbody.innerHTML='';
      if (!data.length) {
        tbody.innerHTML='<tr><td colspan="12" style="text-align:center;color:#777;padding:20px;">Belum ada data</td></tr>';
      } else {
        data.forEach((r,i)=>{
          const bc = r.layanan==='TRANS JATENG'?'tj':r.layanan.toLowerCase();
          const jenis = r.BK?'BK':r.BS?'BS':r.BB?'BB':r.MPU?'MPU':'-';
          tbody.innerHTML+=`<tr>
            <td>${i+1}</td>
            <td><span class="badge badge-${bc}">${r.layanan}</span></td>
            <td>${r.jam_datang||'-'}</td><td>${r.nama_po}</td>
            <td>${r.koperasi||'-'}</td><td>${r.trayek||'-'}</td>
            <td>${r.nomor_bus||'-'}</td><td>${r.jml_seat}</td><td>${r.jml_pnp}</td>
            <td>${r.laik?'✅':'❌'}</td><td>${r.keterangan||'-'}</td>
            <td style="white-space:nowrap;">
              <button onclick="bukaEdit(${JSON.stringify(r).replace(/"/g,'&quot;')})"
                style="background:#1565c0;color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;margin-right:4px;">✏️ Edit</button>
              <button onclick="hapusData('${r.id}','${r.tanggal}','${r.layanan}')"
                style="background:#c62828;color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;">🗑️ Hapus</button>
            </td>
          </tr>`;
        });
      }
      document.getElementById('loadingTabel').style.display='none';
      document.getElementById('tabelHarian').style.display='table';
    } catch(e) {
      showToast('error','Gagal load tabel: '+e.message);
      document.getElementById('loadingTabel').style.display='none';
    }
  }

  // ── Modal Edit ───────────────────────────────────────────────────────────
  function bukaEdit(r) {
    document.getElementById('editId').value        = r.id;
    document.getElementById('editTanggal').value   = r.tanggal;
    document.getElementById('editLayanan').value   = r.layanan;
    document.getElementById('editJamDatang').value = r.jam_datang||'';
    document.getElementById('editJamBerangkat').value = r.jam_berangkat||'';
    document.getElementById('editNomorBus').value  = r.nomor_bus||'';
    document.getElementById('editNamaPO').value    = r.nama_po||'';
    document.getElementById('editKoperasi').value  = r.koperasi||'';
    document.getElementById('editTrayek').value    = r.trayek||'';
    document.getElementById('editSeat').value      = r.jml_seat||0;
    document.getElementById('editPnp').value       = r.jml_pnp||0;
    document.getElementById('editPnpNaik').value   = r.pnp_naik||0;
    document.getElementById('editPnpTurun').value  = r.pnp_turun||0;
    document.getElementById('editKeterangan').value= r.keterangan||'';
    const jenis = r.BK?'BK':r.BS?'BS':r.BB?'BB':r.MPU?'MPU':'BK';
    document.querySelector(`input[name="editJenisBus"][value="${jenis}"]`).checked = true;
    document.querySelector(`input[name="editLaik"][value="${r.laik?'laik':'tidak'}"]`).checked = true;
    document.getElementById('modalEdit').style.display='block';
  }

  function tutupModal() {
    document.getElementById('modalEdit').style.display='none';
  }

  async function simpanEdit() {
    const id      = document.getElementById('editId').value;
    const tanggal = document.getElementById('editTanggal').value;
    const layanan = document.getElementById('editLayanan').value;
    const jenis   = document.querySelector('input[name="editJenisBus"]:checked')?.value||'BK';
    const laikVal = document.querySelector('input[name="editLaik"]:checked')?.value||'laik';
    const payload = {
      jam_datang:    document.getElementById('editJamDatang').value||null,
      jam_berangkat: document.getElementById('editJamBerangkat').value||null,
      nomor_bus:     document.getElementById('editNomorBus').value,
      nama_po:       document.getElementById('editNamaPO').value,
      koperasi:      document.getElementById('editKoperasi').value,
      trayek:        document.getElementById('editTrayek').value,
      jml_seat:      parseInt(document.getElementById('editSeat').value)||0,
      jml_pnp:       parseInt(document.getElementById('editPnp').value)||0,
      pnp_naik:      parseInt(document.getElementById('editPnpNaik').value)||0,
      pnp_turun:     parseInt(document.getElementById('editPnpTurun').value)||0,
      BK: jenis==='BK'?1:0, BS: jenis==='BS'?1:0, BB: jenis==='BB'?1:0, MPU: jenis==='MPU'?1:0,
      laik: laikVal==='laik'?1:0, tidak_laik: laikVal==='tidak'?1:0,
      keterangan: document.getElementById('editKeterangan').value,
    };
    try {
      await sbFetch(`data_harian?id=eq.${id}`, {method:'PATCH', body:JSON.stringify(payload), prefer:'return=minimal'});
      await updateRekap(tanggal, TERMINAL, layanan);
      showToast('success','Data berhasil diupdate!');
      tutupModal();
      loadTabel();
    } catch(e) { showToast('error','Gagal update: '+e.message); }
  }

  // ── Hapus Data ───────────────────────────────────────────────────────────
  async function hapusData(id, tanggal, layanan) {
    if (!confirm('Yakin ingin menghapus data ini?\nRekap bulanan akan otomatis diperbarui.')) return;
    try {
      await sbFetch(`data_harian?id=eq.${id}`, {method:'DELETE', prefer:'return=minimal'});
      await updateRekap(tanggal, TERMINAL, layanan);
      showToast('success','Data berhasil dihapus!');
      loadTabel();
    } catch(e) { showToast('error','Gagal hapus: '+e.message); }
  }

  // ── Reset form ───────────────────────────────────────────────────────────
  function resetForm() {
    document.getElementById('tanggal').value = todayISO();
    document.getElementById('statusBermalam').value = 'tidak';
    document.getElementById('jam_datang').disabled = false;
    document.getElementById('jam_berangkat').disabled = false;
    document.getElementById('grpJamDatang').style.opacity = '1';
    document.getElementById('grpJamBerangkat').style.opacity = '1';
    document.getElementById('jam_datang').value = '';
    document.getElementById('jam_berangkat').value = '';
    document.getElementById('nomor_bus').value = '';
    document.getElementById('nama_po').value = '';
    document.getElementById('nama_po').style.display = '';
    document.getElementById('nama_po_manual').value = '';
    document.getElementById('wrapPOManual').style.display = 'none';
    document.getElementById('chkPOManual').checked = false;
    document.getElementById('koperasi').value = '';
    document.getElementById('trayek').innerHTML = '<option value="">-- Pilih Trayek --</option>';
    document.getElementById('trayek').style.display = '';
    document.getElementById('trayek_manual').value = '';
    document.getElementById('wrapTrayekManual').style.display = 'none';
    document.getElementById('chkTrayekManual').checked = false;
    document.getElementById('jml_seat').value = 0;
    document.getElementById('jml_pnp').value = 0;
    document.getElementById('pnp_naik').value = 0;
    document.getElementById('pnp_turun').value = 0;
    document.getElementById('keterangan').value = '';
    document.querySelector('input[name="jenisBus"][value="BK"]').checked = true;
    document.querySelector('input[name="laikJalan"][value="laik"]').checked = true;
  }

  // Init load
  setLayanan('AKAP');
  loadHistoriBus();
  loadTabel();
</script>
